agent: resolver
# The resolver is a module, not a markdown agent — the run-evals.ts runner
# special-cases this filename and invokes `classifyIntent(input, getSkillRegistry())`
# from src/bot/resolver.ts directly. The "output" that assertions run against
# is `JSON.stringify({skill, args, confidence, second_skill, second_confidence,
# ambiguous})` — the ClassifyResult minus the raw classifier text.
fixtures:
  # ── KB-shaped questions must NOT route to a routed skill ───────────────────
  # kb_query was removed as a synthetic intent because KB queries are now a
  # capability of the default conversation handler. These messages should
  # either nominate no skill or come back with confidence < 0.7 so the
  # message falls through to handleConversation.

  - name: "matrix: VC quote lookup falls through to chat"
    input: "What did Fred Wilson say about glp-1?"
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: regex
        pattern: '"skill":null|"confidence":0\.[0-6]'

  - name: "matrix: self-knowledge query falls through to chat"
    input: "What do I know about world models?"
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: regex
        pattern: '"skill":null|"confidence":0\.[0-6]'

  - name: "matrix: public-figure fact falls through to chat"
    input: "Who runs Stripe these days?"
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: regex
        pattern: '"skill":null|"confidence":0\.[0-6]'

  - name: "matrix: past-decision recall falls through to chat"
    input: "Remind me what we decided about pricing last sprint?"
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: regex
        pattern: '"skill":null|"confidence":0\.[0-6]'

  - name: "matrix: factual non-vault query falls through to chat"
    input: "What time is sunset tonight in Chicago?"
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: regex
        pattern: '"skill":null|"confidence":0\.[0-6]'

  - name: "matrix: journal directive → journal"
    input: "Add this to my journal: watched a long documentary this evening."
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: substring
        value: '"skill":"journal"'

  - name: "matrix: casual small talk falls through to chat"
    input: "Hey, how are you doing today?"
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: regex
        pattern: '"skill":null|"confidence":0\.[0-6]'

  # ── Additional routing fixtures ──────────────────────────────────────────
  # Each exercises a different slash command path through the registry.

  - name: "route: family mentions → family"
    input: "What did I note about my family over the last couple of weeks?"
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: substring
        value: '"skill":"family"'

  - name: "route: weekly review request → weekly"
    input: "Let's do the weekly review for this past week."
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: substring
        value: '"skill":"weekly"'

  - name: "route: save-a-learning directive → learn"
    input: "Please remember that I prefer terse answers with no recap."
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: substring
        value: '"skill":"learn"'

  - name: "route: reset-session intent → fresh"
    input: "Let's start fresh and reset this whole session please."
    assertions:
      - type: json_shape
        required_keys: ["skill", "args", "confidence", "second_skill"]
      - type: substring
        value: '"skill":"fresh"'
