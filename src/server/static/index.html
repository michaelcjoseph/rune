<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="obsidian-vault" content="__OBSIDIAN_VAULT_NAME__">
  <title>Jarvis</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h2>Jarvis</h2>
      <section id="panel-session">
        <h3>Session</h3>
        <div id="session-content" class="panel-body muted">No active session</div>
      </section>
      <section id="panel-queue">
        <h3>Ingestion Queue</h3>
        <div id="queue-content" class="panel-body muted">0 pending</div>
      </section>
      <section id="panel-review">
        <h3>Active Review</h3>
        <div id="review-content" class="panel-body muted">None</div>
      </section>
      <section id="panel-approvals">
        <h3>Pending Approvals</h3>
        <div id="approvals-content" class="panel-body muted">None</div>
      </section>
      <section id="panel-runs">
        <h3>Recent Agent Runs</h3>
        <div id="runs-content" class="panel-body"><span class="muted">No runs yet</span></div>
      </section>
      <section id="panel-projects">
        <h3>Projects</h3>
        <div id="projects-content" class="panel-body"><span class="muted">Loading…</span></div>
      </section>
      <section id="panel-mutations">
        <h3>Work Runs</h3>
        <div id="mutations-active-content" class="panel-body"><span class="muted">None</span></div>
        <h4>Recent</h4>
        <div id="mutations-recent-content" class="panel-body"><span class="muted">No recent runs</span></div>
      </section>
    </aside>
    <main id="main">
      <div id="chat">
        <div id="messages"></div>
      </div>
      <form id="input-form">
        <div id="toolbar">
          <select id="model-select" title="Switch model">
            <option value="opus">Opus</option>
            <option value="sonnet">Sonnet</option>
            <option value="haiku">Haiku</option>
          </select>
          <span id="ws-status" class="ws-status disconnected">disconnected</span>
        </div>
        <textarea
          id="message-input"
          placeholder="Message Jarvis… (Cmd+Enter to send, Enter for newline)"
          rows="3"
          autofocus
        ></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </main>
  </div>

  <!-- Confirmation modal for /work --auto -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <p>Run <strong>/work --auto</strong> on <strong id="modal-slug"></strong>?</p>
      <p class="modal-warning">Edits and commits without further confirmation.</p>
      <div class="modal-actions">
        <button id="modal-run" class="modal-run-btn">Run</button>
        <button id="modal-cancel" class="modal-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Run detail drawer -->
  <div id="mutation-drawer" class="drawer hidden">
    <div class="drawer-header">
      <span id="drawer-title">Run output</span>
      <button id="drawer-close">✕</button>
    </div>
    <pre id="drawer-output" class="drawer-output"></pre>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/14.1.0/markdown-it.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
