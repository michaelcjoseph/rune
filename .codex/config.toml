# Project-level Codex config. Intentionally registers NO MCP servers.
#
# Every `codex exec` (QA + coder roles) runs with cwd set to a rune worktree
# and auto-loads this file. Any MCP server declared here is booted on startup
# for ALL codex-driven execution. A remote server with an expired credential
# crashes the rmcp transport worker, desyncs codex's tool-calling, and fails
# the run — even when the server is unrelated to the task being executed.
#
# The lenny-sync agent is the only consumer of Lenny's data; it calls the API
# directly via curl with $LENNY_MCP_TOKEN (see .codex/agents/lenny-sync.toml),
# not through a codex MCP registration. So do NOT add [mcp_servers.lennysdata]
# (or any remote MCP server with a hardcoded token) back here.
#
# Removed 2026-06-29: an expired lennysdata Bearer JWT (issued 2026-05-01,
# 30-day lifetime, expired 2026-05-31) blocked the project 19 orchestrated run.
